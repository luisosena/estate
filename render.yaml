services:
  - type: web
    name: estate-practice
    env: docker
    # NOTE: 'buildCommand' is ignored when env: docker. The Dockerfile controls
    # the full build (composer install, npm install, npm run build). Do not add it.
    startCommand: "/start.sh"
    # Valkey (Aiven) env vars — set in Render dashboard as secrets:
    #   REDIS_URL              — rediss://default:<password>@<host>:<port>
    #   REDIS_TLS_VERIFY_PEER  — true
    #   SESSION_DRIVER         — redis
    #   QUEUE_CONNECTION       — redis
    #   CACHE_STORE            — redis
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"