services:
  - type: web
    name: estate-practice
    env: docker
    # NOTE: 'buildCommand' is ignored when env: docker. The Dockerfile controls
    # the full build (composer install, npm install, npm run build). Do not add it.
    startCommand: "/start.sh"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"